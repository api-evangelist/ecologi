aid: ecologi
name: Ecologi
description: >-
  Ecologi is a Bristol, UK climate action platform and B Corp founded in 2019
  that lets individuals and businesses fund verified reforestation, carbon
  avoidance, carbon removal, and habitat restoration projects through monthly
  subscriptions, pay-as-you-go purchases, and a public Impact API. The platform
  has funded over 95 million trees, avoided 4.1 million tonnes of CO2e, removed
  61,000 tonnes of CO2e, and restored 102,000 square metres of habitat across
  projects in Guatemala, Brazil, Kenya, Uganda, India, Pakistan, the UK, and
  beyond. Ecologi serves over 16,000 businesses with an end-to-end Measure,
  Reduce, Report (3Rs) workflow aligned to SBTi, GHG Protocol, ISO 14064-1,
  SECR, and CSRD, and exposes a public REST API (and a Zapier app and Shopify
  app) so any business can automate climate impact per order, per signup, per
  invoice, or per workflow event. The Impact API supports trees, local trees
  (UK/US/AU/BR), carbon avoidance, carbon removal, and habitat restoration as
  programmable purchases, with bearer-token auth, test mode, and idempotency
  keys; a separate public Reporting API exposes any user account's impact
  totals without authentication for embedding climate-positive badges.

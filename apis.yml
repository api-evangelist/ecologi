apis:
  - aid: ecologi:ecologi-impact-api
    name: Ecologi Impact API
    description: >-
      The Impact API lets developers programmatically fund climate impact on
      behalf of an Ecologi account. POST endpoints purchase trees, local trees
      in specific countries (UK, US, AU, BR), carbon avoidance credits,
      permanent carbon removals, and habitat restoration in square metres.
      Requests authenticate with a Bearer token API key, support a "test"
      flag for safe simulation, accept an Idempotency-Key header to make
      retries safe, and can attribute purchases to a recipient via name and
      recipientEmail. Purchases are aggregated and invoiced monthly with a
      £3 minimum.
    humanURL: https://docs.ecologi.com/
    baseURL: https://public.ecologi.com
    tags:
      - Climate
      - Impact
      - Trees
      - Carbon
      - Habitat
    properties:
      - type: Documentation
        url: https://docs.ecologi.com/
      - type: Authentication
        url: https://docs.ecologi.com/
      - type: SignUp
        url: https://ecologi.com/impact-api
  - aid: ecologi:ecologi-reporting-api
    name: Ecologi Reporting API
    description: >-
      The Reporting API exposes read-only impact totals for any public Ecologi
      account by username. GET endpoints return total trees funded, CO2e
      avoided, CO2e removed, habitat restored, and a combined impact summary.
      No authentication is required and data refreshes every 10 minutes, making
      it ideal for embedding climate-positive counters and badges on company
      websites, dashboards, and apps.
    humanURL: https://docs.ecologi.com/
    baseURL: https://public.ecologi.com
